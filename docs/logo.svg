<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="rfGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#0288d1"/>
    </linearGradient>
    <linearGradient id="triGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#0277bd"/>
    </linearGradient>
    <linearGradient id="filterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
    <linearGradient id="mixerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa726"/>
      <stop offset="100%" style="stop-color:#e65100"/>
    </linearGradient>
    <linearGradient id="sineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#4fc3f7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="64" ry="64" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#4fc3f7" stroke-width="0.5">
    <line x1="96" y1="16" x2="96" y2="496"/>
    <line x1="176" y1="16" x2="176" y2="496"/>
    <line x1="256" y1="16" x2="256" y2="496"/>
    <line x1="336" y1="16" x2="336" y2="496"/>
    <line x1="416" y1="16" x2="416" y2="496"/>
    <line x1="16" y1="96" x2="496" y2="96"/>
    <line x1="16" y1="176" x2="496" y2="176"/>
    <line x1="16" y1="256" x2="496" y2="256"/>
    <line x1="16" y1="336" x2="496" y2="336"/>
    <line x1="16" y1="416" x2="496" y2="416"/>
  </g>

  <!-- Signal flow line (horizontal backbone) -->
  <line x1="60" y1="256" x2="452" y2="256" stroke="#4fc3f7" stroke-width="2.5" opacity="0.25"/>

  <!-- Amplifier triangle (left) -->
  <polygon points="100,216 170,256 100,296" fill="url(#triGrad)" opacity="0.9" stroke="#4fc3f7" stroke-width="2"/>
  <text x="120" y="262" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">A</text>

  <!-- Signal flow arrow 1 -->
  <line x1="175" y1="256" x2="205" y2="256" stroke="#4fc3f7" stroke-width="2.5" opacity="0.5"/>
  <polygon points="205,251 215,256 205,261" fill="#4fc3f7" opacity="0.5"/>

  <!-- Filter block (center-left) -->
  <rect x="218" y="228" width="76" height="56" rx="6" ry="6" fill="url(#filterGrad)" opacity="0.9" stroke="#66bb6a" stroke-width="2"/>
  <text x="256" y="248" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">BPF</text>
  <!-- Frequency response curve inside filter -->
  <path d="M232,268 Q244,258 256,258 Q268,258 280,268" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7"/>

  <!-- Signal flow arrow 2 -->
  <line x1="298" y1="256" x2="328" y2="256" stroke="#4fc3f7" stroke-width="2.5" opacity="0.5"/>
  <polygon points="328,251 338,256 328,261" fill="#4fc3f7" opacity="0.5"/>

  <!-- Mixer circle (center-right) -->
  <circle cx="370" cy="256" r="32" fill="url(#mixerGrad)" opacity="0.9" stroke="#ffa726" stroke-width="2"/>
  <!-- X inside mixer -->
  <line x1="352" y1="238" x2="388" y2="274" stroke="#fff" stroke-width="2.5" opacity="0.8"/>
  <line x1="388" y1="238" x2="352" y2="274" stroke="#fff" stroke-width="2.5" opacity="0.8"/>

  <!-- LO injection arrow (from below) -->
  <line x1="370" y1="330" x2="370" y2="292" stroke="#ffa726" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <polygon points="365,295 370,288 375,295" fill="#ffa726" opacity="0.6"/>
  <text x="370" y="348" font-family="Arial, sans-serif" font-size="12" fill="#ffa726" text-anchor="middle" opacity="0.7">LO</text>

  <!-- Output arrow -->
  <line x1="405" y1="256" x2="445" y2="256" stroke="#4fc3f7" stroke-width="2.5" opacity="0.5"/>
  <polygon points="440,251 452,256 440,261" fill="#4fc3f7" opacity="0.5"/>

  <!-- Sine wave overlay (decorative, across top) -->
  <path d="M60,140 Q100,100 140,140 Q180,180 220,140 Q260,100 300,140 Q340,180 380,140 Q420,100 452,140"
        fill="none" stroke="url(#sineGrad)" stroke-width="2" opacity="0.4"/>

  <!-- PCB layer lines (decorative, bottom area) -->
  <rect x="80" y="380" width="352" height="6" rx="1" fill="#ef5350" opacity="0.3"/>
  <rect x="80" y="392" width="352" height="10" rx="1" fill="#fff9c4" opacity="0.15"/>
  <rect x="80" y="408" width="352" height="6" rx="1" fill="#42a5f5" opacity="0.3"/>
  <rect x="80" y="420" width="352" height="10" rx="1" fill="#e0e0e0" opacity="0.15"/>
  <rect x="80" y="436" width="352" height="6" rx="1" fill="#ffa726" opacity="0.3"/>

  <!-- Title text -->
  <text x="256" y="108" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">drawio</text>
  <text x="256" y="138" font-family="Arial, sans-serif" font-size="16" fill="#4fc3f7" text-anchor="middle" letter-spacing="4" opacity="0.9">ENGINEERING</text>

  <!-- MCP badge (bottom right corner) -->
  <rect x="370" y="456" width="60" height="22" rx="4" fill="#4fc3f7" opacity="0.2"/>
  <text x="400" y="471" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7" text-anchor="middle" opacity="0.8">MCP</text>
</svg>
